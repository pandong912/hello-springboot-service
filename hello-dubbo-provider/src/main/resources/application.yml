server:
  port: 8082

dubbo:
  application:
    name: hello-dubbo
    logger: slf4j
    qos-enable: false
  protocol:
    name: tri
    port: 50051
  registry:
    address: N/A
  provider:
    token: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
