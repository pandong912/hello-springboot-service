name: Build and Deploy

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: hello-springboot
  GITOPS_REPO: ${{ vars.GITOPS_REPO || format('{0}/ai-platform-infra', github.repository_owner) }}
  GITOPS_BRANCH: master
  GITOPS_VALUES_FILE: gitops/apps/hello-springboot/values-dev.yaml

jobs:
  build:
    name: Test and build image
    runs-on: ubuntu-latest
    outputs:
      image-suffix: ${{ steps.meta.outputs.image-suffix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test and package
        run: mvn --batch-mode clean package

      - name: Set image tag
        id: meta
        run: echo "image-suffix=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Container build check
        run: |
          podman build -f hello-web/Dockerfile -t "${ECR_REPOSITORY}:web-${{ steps.meta.outputs.image-suffix }}" .
          podman build -f hello-grpc-provider/Dockerfile -t "${ECR_REPOSITORY}:grpc-${{ steps.meta.outputs.image-suffix }}" .
          podman build -f hello-dubbo-provider/Dockerfile -t "${ECR_REPOSITORY}:dubbo-${{ steps.meta.outputs.image-suffix }}" .

  deploy-dev:
    name: Push image and update GitOps
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package
        run: mvn --batch-mode -DskipTests package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_APP_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-app-ci

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_SUFFIX: ${{ needs.build.outputs.image-suffix }}
        run: |
          IMAGE_REPOSITORY="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          podman build -f hello-web/Dockerfile -t "${IMAGE_REPOSITORY}:web-${IMAGE_SUFFIX}" .
          podman build -f hello-grpc-provider/Dockerfile -t "${IMAGE_REPOSITORY}:grpc-${IMAGE_SUFFIX}" .
          podman build -f hello-dubbo-provider/Dockerfile -t "${IMAGE_REPOSITORY}:dubbo-${IMAGE_SUFFIX}" .
          podman push "${IMAGE_REPOSITORY}:web-${IMAGE_SUFFIX}"
          podman push "${IMAGE_REPOSITORY}:grpc-${IMAGE_SUFFIX}"
          podman push "${IMAGE_REPOSITORY}:dubbo-${IMAGE_SUFFIX}"
          echo "IMAGE_SUFFIX=${IMAGE_SUFFIX}" >> "$GITHUB_ENV"
          echo "IMAGE_REPOSITORY=${ECR_REGISTRY}/${ECR_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops-repo

      - name: Update image tag in GitOps values
        working-directory: gitops-repo
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path("${{ env.GITOPS_VALUES_FILE }}")
          image_repository = os.environ["IMAGE_REPOSITORY"]
          image_suffix = os.environ["IMAGE_SUFFIX"]

          text = path.read_text()
          replacements = {
              "web": f"web-{image_suffix}",
              "grpc": f"grpc-{image_suffix}",
              "dubbo": f"dubbo-{image_suffix}",
          }
          lines = text.splitlines()
          output = []
          component = None
          in_image = False

          for line in lines:
              stripped = line.strip()
              if line.startswith("  ") and not line.startswith("    ") and stripped.endswith(":"):
                  maybe_component = stripped[:-1]
                  if maybe_component in replacements:
                      component = maybe_component
                      in_image = False
              if component and line.startswith("    image:"):
                  in_image = True
              elif in_image and line.startswith("    ") and not line.startswith("      "):
                  in_image = False
              if component and in_image and stripped.startswith("repository:"):
                  output.append(f"      repository: {image_repository}")
              elif component and in_image and stripped.startswith("tag:"):
                  output.append(f"      tag: {replacements[component]}")
              else:
                  output.append(line)

          path.write_text("\\n".join(output) + "\\n")
          PY

      - name: Commit GitOps update
        working-directory: gitops-repo
        env:
          GH_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
        run: |
          BRANCH="update-hello-springboot-${IMAGE_SUFFIX}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add "${GITOPS_VALUES_FILE}"
          if git diff --cached --quiet; then
            echo "No GitOps changes to commit."
          else
            git commit -m "Update hello service images to ${IMAGE_SUFFIX}"
            git push --force-with-lease origin "${BRANCH}"
            gh pr create \
              --repo "${GITOPS_REPO}" \
              --base "${GITOPS_BRANCH}" \
              --head "${BRANCH}" \
              --title "Update hello service images to ${IMAGE_SUFFIX}" \
              --body "Updates dev GitOps image tags for web, gRPC, and Dubbo services to ${IMAGE_SUFFIX}." \
              || gh pr view "${BRANCH}" --repo "${GITOPS_REPO}"
          fi
